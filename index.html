<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Submission</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(120deg,#000000,#ffffff);
}

/* Main card */

.panel{
background:white;
padding:40px;
width:380px;
border-radius:10px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

/* Title */

h1{
font-size:22px;
margin-bottom:8px;
color:#111;
}

.subtitle{
font-size:13px;
color:#555;
margin-bottom:25px;
}

/* Input */

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
margin-bottom:20px;
outline:none;
transition:0.2s;
}

input:focus{
border-color:black;
box-shadow:0 0 0 2px rgba(0,0,0,0.1);
}

/* Button */

button{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
border-radius:6px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:0.25s;
}

button:hover{
background:#222;
transform:translateY(-1px);
}

button:active{
transform:scale(0.98);
}

/* Footer */

.footer{
margin-top:18px;
font-size:11px;
color:#777;
text-align:center;
}

</style>
</head>

<body>

<div class="panel">

<h1>Submit Token</h1>
<div class="subtitle">Enter your token below to continue.</div>

<input type="text" placeholder="Paste token here">

<button>Submit Token</button>

<div class="footer">
Secure verification portal
</div>

</div>

</body>
  </html>
