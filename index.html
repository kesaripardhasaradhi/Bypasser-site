<!DOCTYPE html>
<html>
<head>

<title>Premium Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay"></div>

<div class="container">

<h1 class="title">JASHITH NIGGER</h1>
<p class="subtitle">PREMIUM BYPASSER</p>

<div class="panel">

<h3>INITIATE PROCESS</h3>

<input placeholder="RBLX.SECURITY">
<input type="password" placeholder="Security Key">

<button class="start"> START</button>

</div>

<div class="panel">

<h3>SYSTEM STATUS</h3>

<div class="status">
<span>Mainframe</span>
<span class="red">ONLINE</span>
</div>

<div class="status">
<span>Override Module</span>
<span class="red">ACTIVE</span>
</div>

</div>

<div class="panel logs">

<h3>OPERATION LOGS</h3>

<div id="logs">
Initializing system...
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
