<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium UI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Glass card */
.container{
background: rgba(255,255,255,0.08);
backdrop-filter: blur(15px);
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.15);
}

h1{
color:white;
margin-bottom:25px;
font-weight:600;
}

/* Input box */
input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
outline:none;
margin-bottom:20px;
background:rgba(255,255,255,0.1);
color:white;
font-size:15px;
}

/* Button */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:white;
background: linear-gradient(45deg,#ff416c,#ff4b2b);
transition:0.3s;
}

/* Button animation */
button:hover{
transform:translateY(-3px) scale(1.03);
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

button:active{
transform:scale(0.96);
}

.footer{
margin-top:15px;
font-size:12px;
color:rgba(255,255,255,0.6);
}

</style>
</head>

<body>

<div class="container">
<h1>Premium Panel</h1>

<input type="text" placeholder="Paste biscuit here...">

<button>Paste Biscuit Here</button>

<div class="footer">
Secure Access Panel
</div>

</div>

</body>
  </html>
