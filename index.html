<!DOCTYPE html>
<html>
<head>
<title>Jashith Page</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
font-size:70px;
margin-top:40px;
color:#ff2e63;
text-shadow:0 0 20px #ff2e63,0 0 40px #ff2e63;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #ff2e63;}
to{ text-shadow:0 0 40px #ff2e63;}
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:40px;
margin-top:60px;
padding-bottom:60px;
}

.card{
background:#141414;
border-radius:20px;
padding:20px;
box-shadow:0 0 25px rgba(0,0,0,0.8);
transition:0.4s;
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 40px #ff2e63;
}

img{
width:320px;
border-radius:15px;
}

.caption{
margin-top:15px;
font-size:30px;
color:#ff2e63;
}
</style>

</head>

<body>

<h1>JASHITH EWWWW 🤢</h1>

<div class="container">

<div class="card">
<img src="photo1.jpg">
<div class="caption">jashith ewwww</div>
</div>

<div class="card">
<img src="photo2.jpg">
<div class="caption">jashith ewwww</div>
</div>

</div>

</body>
</html>
