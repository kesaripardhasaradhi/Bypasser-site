<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dengey Kojjja!</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #000000, #1a1a1a, #ffffff);
      font-family: 'Comic Sans MS', sans-serif;
      overflow: hidden;
    }

    #message {
      font-size: 60px;
      color: #ff69b4;
      text-shadow: 2px 2px 10px #ff00ff, -2px -2px 10px #00ffff;
      animation: glow 1s ease-in-out infinite alternate;
    }

    @keyframes glow {
      0% { text-shadow: 2px 2px 10px #ff00ff, -2px -2px 10px #00ffff; }
      50% { text-shadow: 4px 4px 20px #ffff00, -4px -4px 20px #00ff00; }
      100% { text-shadow: 2px 2px 10px #ff00ff, -2px -2px 10px #00ffff; }
    }

    /* Floating emojis */
    .emoji {
      position: absolute;
      font-size: 30px;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="message">🎉 dengey kojjja 🎉</div>

  <script>
    const emojis = ["🔥","💥","✨","💫","🌟","🌈","😎"];
    for(let i = 0; i < 20; i++){
      const span = document.createElement("span");
      span.className = "emoji";
      span.innerText = emojis[Math.floor(Math.random() * emojis.length)];
      span.style.left = Math.random() * 100 + "vw";
      span.style.animationDuration = (3 + Math.random() * 5) + "s";
      span.style.fontSize = (20 + Math.random() * 40) + "px";
      document.body.appendChild(span);
    }
  </script>
</body>
</html>
