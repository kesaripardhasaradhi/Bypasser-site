<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bypasser Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    background:#0b0b0b;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    margin:0;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    margin-top:40px;
}

.title{
    font-size:32px;
    font-weight:bold;
}

.subtitle{
    color:#777;
    margin-bottom:30px;
}

.panel{
    background:#111;
    border-radius:10px;
    padding:25px;
    margin-bottom:25px;
    box-shadow:0 0 20px rgba(255,255,255,0.05);
}

input{
    width:100%;
    padding:14px;
    margin-top:10px;
    margin-bottom:15px;
    background:#1a1a1a;
    border:none;
    border-radius:6px;
    color:white;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:8px;
    background:white;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#e2e2e2;
}

.status{
    display:flex;
    justify-content:space-between;
    background:#151515;
    padding:15px;
    border-radius:8px;
    margin-top:10px;
}

.green{
    color:#00ff88;
}

.join{
    text-align:center;
    margin-top:20px;
}

.join button{
    background:white;
}

</style>
</head>

<body>

<div class="container">

<div class="title">BYPASSER PANEL</div>
<div class="subtitle">High-performance control dashboard</div>

<div class="panel">

<h3>Initiate Process</h3>

<input type="text" placeholder="Target Input">

<input type="password" placeholder="Password">

<button>⚡ Start Process</button>

</div>

<div class="panel">

<h3>System Status</h3>

<div class="status">
<span>Mainframe</span>
<span class="green">STABLE</span>
</div>

<div class="status">
<span>Override v4</span>
<span class="green">OPTIMAL</span>
</div>

</div>

<div class="panel join">

<h3>Network Access</h3>

<p>Access community modules and logs.</p>

<button>Join Community →</button>

</div>

</div>

</body>
</html>
